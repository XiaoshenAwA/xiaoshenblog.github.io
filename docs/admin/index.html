  <style>
    .admin-view { display: none; }
    .admin-view.active { display: block; animation: adminFadeIn 0.25s ease; }
    @keyframes adminFadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .message-msg { margin-top: 10px; padding: 8px; border-radius: var(--radius-sm, 8px); }
    .message-msg.success { color: #155724; background-color: #d4edda; border: 1px solid #c3e6cb; }
    .message-msg.error { color: #721c24; background-color: #f8d7da; border: 1px solid #f5c6cb; }
    .admin-header .btn-group { display: inline-flex; gap: 8px; align-items: center; }
    #theme-toggle-admin { width: 36px; height: 36px; display: inline-flex; align-items: center; justify-content: center; border: none; border-radius: 50%; background: var(--bg-card); color: var(--text-secondary); cursor: pointer; font-size: 1em; box-shadow: var(--shadow); transition: 0.3s; }
    #theme-toggle-admin:hover { background: var(--accent); color: #fff; }
    .toggle-switch { position: relative; display: inline-block; width: 44px; height: 24px; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #ccc; border-radius: 24px; transition: 0.3s; }
    .toggle-slider::before { content: ''; position: absolute; height: 18px; width: 18px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: 0.3s; }
    .toggle-switch input:checked + .toggle-slider { background: var(--accent, #3498db); }
    .toggle-switch input:checked + .toggle-slider::before { transform: translateX(20px); }
    .post-item-status { display: inline-flex; align-items: center; gap: 4px; font-size: 0.85em; }
    .post-item-status .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .post-item-status .status-dot.published { background: #27ae60; }
    .post-item-status .status-dot.private { background: #e74c3c; }
  </style>
  
  <style>
    #preloader {
      position: fixed; inset: 0; z-index: 99999;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.5s;
    }
    #preloader.hide { opacity: 0; pointer-events: none; }
    #preloader .loader {
      --color: var(--accent);
      --size-mid: 40px;
      --size-dot: 10px;
      --size-bar: 3px;
      --size-square: 24px;
      display: block; position: relative;
      width: 60px; height: 60px;
    }
    #preloader .loader::before,
    #preloader .loader::after {
      content: ''; box-sizing: border-box; position: absolute;
    }
    #preloader .loader.--1::before {
      width: var(--size-mid); height: var(--size-mid);
      border: 4px solid var(--color); border-top-color: transparent;
      border-radius: 50%; left: 50%; top: 50%; transform: translate(-50%,-50%);
      animation: l1 1s linear infinite;
    }
    #preloader .loader.--1::after {
      width: calc(var(--size-mid) - 2px); height: calc(var(--size-mid) - 2px);
      border: 2px solid transparent; border-top-color: var(--color);
      border-radius: 50%; left: 50%; top: 50%; transform: translate(-50%,-50%);
      animation: l1 0.6s linear reverse infinite;
    }
    @keyframes l1 { to { transform: translate(-50%,-50%) rotate(360deg); } }
    #preloader .loader.--2::before, #preloader .loader.--2::after {
      width: var(--size-dot); height: var(--size-dot);
      background-color: var(--color); border-radius: 50%; opacity: 0;
      animation: l2 0.8s cubic-bezier(0.2,0.32,0,0.87) infinite;
    }
    #preloader .loader.--2::after { animation-delay: 0.3s; }
    @keyframes l2 { 0%,80%,100% { opacity: 0; } 33% { opacity: 1; } 0%,100% { transform: translateX(-24px); } 90% { transform: translateX(24px); } }
    #preloader .loader.--3::before, #preloader .loader.--3::after {
      width: var(--size-dot); height: var(--size-dot);
      background-color: var(--color); border-radius: 50%; top: 50%;
      animation: l3 1.2s ease-in-out infinite;
    }
    #preloader .loader.--3::before { left: calc(50% - 16px); }
    #preloader .loader.--3::after { left: calc(50% + 8px); animation-delay: -0.4s; }
    @keyframes l3 { 0%,100% { transform: translateY(-20px); } 44% { transform: translateY(20px); } }
    #preloader .loader.--4::before {
      height: var(--size-bar); width: 40px; background-color: var(--color);
      left: 50%; top: 50%; transform-origin: left;
      animation: l4 0.8s cubic-bezier(0,0,0.03,0.9) infinite;
    }
    @keyframes l4 { 0%,44%,88.1%,100% { transform-origin: left; } 0%,100%,88% { transform: scaleX(0); } 44.1%,88% { transform-origin: right; } 33%,44% { transform: scaleX(1); } }
    #preloader .loader.--5::before, #preloader .loader.--5::after {
      height: 20px; width: var(--size-bar); background-color: var(--color);
      animation: l5 0.6s cubic-bezier(0,0,0.03,0.9) infinite;
    }
    #preloader .loader.--5::before { left: calc(50% - 8px); top: calc(50% - 24px); }
    #preloader .loader.--5::after { left: calc(50% + 8px); top: calc(50% - 8px); animation-delay: 0.2s; }
    @keyframes l5 { 0%,88%,100% { opacity: 0; } 0% { transform: translateY(-40px); } 33% { opacity: 1; } 33%,88% { transform: translateY(20px); } }
    #preloader .loader.--6::before, #preloader .loader.--7::before {
      width: var(--size-square); height: var(--size-square); background-color: var(--color);
      top: calc(50% - var(--size-square)); left: calc(50% - var(--size-square));
      animation: l6 2.4s cubic-bezier(0,0,0.24,1.21) infinite;
    }
    @keyframes l6 { 0%,100% { transform: none; } 25% { transform: translateX(100%); } 50% { transform: translateX(100%) translateY(100%); } 75% { transform: translateY(100%); } }
    #preloader .loader.--7::after {
      width: var(--size-square); height: var(--size-square); background-color: var(--color);
      top: 50%; left: 50%;
      animation: l7 2.4s cubic-bezier(0,0,0.24,1.21) infinite;
    }
    @keyframes l7 { 0%,100% { transform: none; } 25% { transform: translateX(-100%); } 50% { transform: translateX(-100%) translateY(-100%); } 75% { transform: translateY(-100%); } }
    #preloader .loader.--8::before, #preloader .loader.--8::after {
      width: var(--size-dot); height: var(--size-dot); border-radius: 50%; background-color: var(--color);
    }
    #preloader .loader.--8::before { top: calc(50% + 30px); animation: l8-1 0.8s cubic-bezier(0.06,0.01,0.49,1.18) infinite; }
    @keyframes l8-1 { 0%,55%,100% { opacity: 0; } 0% { transform: scale(0.2); } 22% { opacity: 1; } 33%,55% { transform: scale(1) translateY(-40px); } }
    #preloader .loader.--8::after { opacity: 0; top: calc(50% - 12px); animation: l8-2 0.8s cubic-bezier(0.46,-0.1,0.27,1.07) 0.2s infinite; }
    @keyframes l8-2 { 0%,100% { opacity: 0; } 33% { opacity: 0.3; } 0% { transform: scale(0); } 100% { transform: scale(4); } }
    #preloader .loader.--9::before, #preloader .loader.--9::after {
      width: var(--size-dot); height: var(--size-dot); border-radius: 50%; background-color: var(--color); top: 50%;
      animation: l9 0.42s cubic-bezier(0.39,0.31,0,1.11) infinite;
    }
    #preloader .loader.--9::before { left: calc(50% - 20px); }
    #preloader .loader.--9::after { left: calc(50% + 12px); animation-delay: 0.12s; }
    @keyframes l9 { 0%,100% { opacity: 0; } 0% { transform: translate(-24px,-24px); } 66% { opacity: 1; } 66%,100% { transform: none; } }
  </style>
  
  <script>
    try {
      var t = localStorage.getItem('theme');
      if (t) document.documentElement.setAttribute('data-theme', t);
      else { if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) document.documentElement.setAttribute('data-theme', 'dark'); }
    } catch(e) {}
  </script>
</head>
<body>
  
  <div id="preloader"><div class="loader" id="loaderEl"></div></div>
  <script>
    (function(){var e=document.getElementById('loaderEl');if(e)e.classList.add('--'+Math.floor(Math.random()*9+1));})();
    window.addEventListener('load',function(){var p=document.getElementById('preloader');if(p)setTimeout(function(){p.classList.add('hide')},300)});
  </script>
  
<div class="admin-page">
  <div class="admin-header">
    <h1><i class="fas fa-cog"></i> 后台管理</h1>
    <div>
      <span class="admin-user" id="user-email"></span>
      <div class="btn-group">
        <button id="theme-toggle-admin" title="切换主题"><i class="fas fa-adjust"></i></button>
        <button class="btn btn-sm btn-outline" id="change-pw-btn" style="display:none"><i class="fas fa-key"></i> 修改密码</button>
        <button class="btn btn-sm btn-outline" id="logout-btn" style="display:none"><i class="fas fa-sign-out-alt"></i> 退出</button>
      </div>
    </div>
  </div>

  <div class="admin-view" id="view-login">
    <div class="login-box">
      <h2><i class="fas fa-lock"></i> 管理员登录</h2>
      <form id="login-form">
        <div class="form-group">
          <input type="email" id="login-email" placeholder="邮箱" required>
        </div>
        <div class="form-group">
          <input type="password" id="login-password" placeholder="密码" required>
        </div>
        <button type="submit" class="btn btn-primary">登录</button>
        <div class="error-msg" id="login-error"></div>
      </form>
    </div>
  </div>

  <div class="admin-view" id="view-posts">
    <div class="toolbar">
      <button class="btn btn-primary" id="new-post-btn"><i class="fas fa-pen"></i> 写文章</button>
      <button class="btn btn-outline" id="edit-about-btn"><i class="fas fa-pen"></i> 编辑关于页</button>
      <button class="btn btn-outline" id="manage-tags-btn"><i class="fas fa-tags"></i> 标签管理</button>
      <button class="btn btn-outline" id="manage-categories-btn"><i class="fas fa-folder-open"></i> 分类管理</button>
      <a href="/xiaoshenblog.github.io/" class="btn btn-outline"><i class="fas fa-arrow-left"></i> 返回首页</a>
    </div>
    <div class="search-bar">
      <i class="fas fa-search search-icon"></i>
      <input type="text" id="post-search" placeholder="搜索文章标题、标签..." autocomplete="off">
      <button class="search-clear" id="search-clear" title="清除"><i class="fas fa-times"></i></button>
    </div>
    <div id="posts-loading" class="loading">加载中...</div>
    <div id="posts-error" class="error-msg"></div>
    <div id="posts-list"></div>
    <div id="posts-empty" class="loading" style="display:none">没有找到匹配的文章</div>
  </div>

  <div class="admin-view" id="view-edit">
    <div class="edit-box">
      <h3 id="edit-heading"><i class="fas fa-pen"></i> 写文章</h3>
      <form id="edit-form">
        <input type="hidden" id="edit-id">
        <div class="form-group">
          <input type="text" id="edit-title" required placeholder="输入文章标题..." style="font-size:1.3em;font-weight:600;border:none;padding:8px 0;background:transparent;color:var(--text);width:100%;outline:none;">
        </div>
        <div class="form-group editor-wrap">
          <div class="editor-toolbar">
            <button type="button" class="toolbar-btn" data-target="edit-content" data-md="**" data-wrap="**" title="粗体"><i class="fas fa-bold"></i></button>
            <button type="button" class="toolbar-btn" data-target="edit-content" data-md="*" data-wrap="*" title="斜体"><i class="fas fa-italic"></i></button>
            <button type="button" class="toolbar-btn" data-target="edit-content" data-md="~~" data-wrap="~~" title="删除线"><i class="fas fa-strikethrough"></i></button>
            <span class="toolbar-divider"></span>
            <button type="button" class="toolbar-btn" data-target="edit-content" data-md="# " data-wrap="" title="标题"><i class="fas fa-heading"></i></button>
            <button type="button" class="toolbar-btn" data-target="edit-content" data-md="> " data-wrap="" title="引用"><i class="fas fa-quote-right"></i></button>
            <button type="button" class="toolbar-btn" data-target="edit-content" data-md="- " data-wrap="" title="无序列表"><i class="fas fa-list-ul"></i></button>
            <button type="button" class="toolbar-btn" data-target="edit-content" data-md="1. " data-wrap="" title="有序列表"><i class="fas fa-list-ol"></i></button>
            <span class="toolbar-divider"></span>
            <button type="button" class="toolbar-btn" data-target="edit-content" data-md="```\n" data-wrap="\n```" title="代码块"><i class="fas fa-code"></i></button>
            <button type="button" class="toolbar-btn" data-target="edit-content" data-md="[" data-wrap="](url)" title="链接"><i class="fas fa-link"></i></button>
            <button type="button" class="toolbar-btn" data-target="edit-content" data-md="![" data-wrap="](url)" title="图片"><i class="fas fa-image"></i></button>
            <button type="button" class="toolbar-btn" data-target="edit-content" data-md="---" data-wrap="" title="分割线"><i class="fas fa-minus"></i></button>
            <span class="toolbar-divider"></span>
            <button type="button" class="toolbar-btn fs-toggle" title="全屏"><i class="fas fa-expand"></i></button>
            <span class="toolbar-divider"></span>
            <button type="button" class="toolbar-btn indent-toggle" title="缩进方式：Tab（点击切换为空格）"><i class="fas fa-indent"></i></button>
            <button type="button" class="toolbar-btn view-mode-btn active" data-mode="split" data-target="editor-edit" title="分栏"><i class="fas fa-columns"></i></button>
            <button type="button" class="toolbar-btn view-mode-btn" data-mode="edit" data-target="editor-edit" title="仅编辑"><i class="fas fa-pen"></i></button>
            <button type="button" class="toolbar-btn view-mode-btn" data-mode="preview" data-target="editor-edit" title="仅预览"><i class="fas fa-eye"></i></button>
          </div>
          <div class="editor-container" id="editor-edit">
            <div class="editor-pane">
              <div class="editor-input-wrap">
                <div class="editor-gutter" data-for="edit-content"></div>
                <textarea id="edit-content" required placeholder="支持 Markdown 语法"></textarea>
              </div>
            </div>
            <div class="editor-pane">
              <div class="post-content" id="edit-preview"><p class="muted">预览区域</p></div>
            </div>
          </div>
        </div>
        <div style="display:flex;gap:12px;margin:12px 0;flex-wrap:wrap;">
          <div style="flex:1;min-width:200px;">
            <label style="font-size:0.82em;color:var(--text-secondary);margin-bottom:4px;display:block;">分类</label>
            <div id="selected-cats-box" style="display:flex;gap:4px;flex-wrap:wrap;padding:6px 10px;border:2px solid var(--border);border-radius:8px;min-height:34px;cursor:pointer;background:var(--input-bg);align-items:center;" onclick="openCategoryPicker()">
              <span id="selected-cats-display" style="color:var(--text-muted);font-size:0.88em;">点击选择分类</span>
            </div>
            <input type="hidden" id="edit-category">
          </div>
          <div style="flex:1;min-width:200px;">
            <label style="font-size:0.82em;color:var(--text-secondary);margin-bottom:4px;display:block;">标签</label>
            <div id="selected-tags-box" style="display:flex;gap:4px;flex-wrap:wrap;padding:6px 10px;border:2px solid var(--border);border-radius:8px;min-height:34px;cursor:pointer;background:var(--input-bg);align-items:center;" onclick="openTagPicker()">
              <span id="selected-tags-display" style="color:var(--text-muted);font-size:0.88em;">点击选择标签</span>
            </div>
            <input type="hidden" id="edit-tags">
          </div>
          <div style="flex:2;min-width:200px;">
            <label style="font-size:0.82em;color:var(--text-secondary);margin-bottom:4px;display:block;">封面图</label>
            <input type="text" id="edit-cover" placeholder="封面图 URL" style="width:100%;padding:6px 10px;border:2px solid var(--border);border-radius:8px;font-size:0.88em;background:var(--input-bg);color:var(--text);box-sizing:border-box;">
          </div>
        </div>
        <div style="margin:12px 0;display:flex;align-items:center;gap:8px;">
          <label class="toggle-switch">
            <input type="checkbox" id="edit-published" checked>
            <span class="toggle-slider"></span>
          </label>
          <span id="edit-published-label">公开</span>
        </div>
        <div class="error-msg" id="edit-error"></div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary" id="edit-submit">保存</button>
          <button type="button" class="btn btn-outline" onclick="cancelEdit()">取消</button>
        </div>
      </form>
    </div>
  </div>

  <div class="admin-view" id="view-change-pw">
    <div class="edit-box">
      <h3><i class="fas fa-key"></i> 修改密码</h3>
      <form id="change-pw-form">
        <div class="form-group">
          <label>修改密码</label>
          <input type="password" id="new-password" required placeholder="输入新密码" minlength="6">
        </div>
        <div class="form-group">
          <label>再次输入新密码</label>
          <input type="password" id="confirm-password" required placeholder="再次输入新密码" minlength="6">
        </div>
        <div id="change-pw-message" class="message-msg" style="display:none;"></div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary" id="change-pw-submit">确认修改</button>
          <button type="button" class="btn btn-outline" onclick="cancelChangePw()">取消</button>
        </div>
      </form>
    </div>
  </div>

    <div class="edit-box">
      <h3><i class="fas fa-info-circle"></i> 编辑关于页</h3>
      <form id="about-form">
        <div class="form-group editor-wrap">
          <div class="editor-toolbar">
            <button type="button" class="toolbar-btn" data-target="about-content" data-md="**" data-wrap="**" title="粗体"><i class="fas fa-bold"></i></button>
            <button type="button" class="toolbar-btn" data-target="about-content" data-md="*" data-wrap="*" title="斜体"><i class="fas fa-italic"></i></button>

            <button type="button" class="toolbar-btn" data-target="about-content" data-md="> " data-wrap="" title="引用"><i class="fas fa-quote-right"></i></button>
            <button type="button" class="toolbar-btn" data-target="about-content" data-md="- " data-wrap="" title="无序列表"><i class="fas fa-list-ul"></i></button>
            <button type="button" class="toolbar-btn" data-target="about-content" data-md="1. " data-wrap="" title="有序列表"><i class="fas fa-list-ol"></i></button>
            <span class="toolbar-divider"></span>
            <button type="button" class="toolbar-btn" data-target="about-content" data-md="```\n" data-wrap="\n```" title="代码块"><i class="fas fa-code"></i></button>
            <button type="button" class="toolbar-btn" data-target="about-content" data-md="[" data-wrap="](url)" title="链接"><i class="fas fa-link"></i></button>
            <button type="button" class="toolbar-btn" data-target="about-content" data-md="![" data-wrap="](url)" title="图片"><i class="fas fa-image"></i></button>
            <button type="button" class="toolbar-btn" data-target="about-content" data-md="---" data-wrap="" title="分割线"><i class="fas fa-minus"></i></button>
            <span class="toolbar-divider"></span>
            <button type="button" class="toolbar-btn fs-toggle" title="全屏"><i class="fas fa-expand"></i></button>
            <span class="toolbar-divider"></span>
            <button type="button" class="toolbar-btn indent-toggle" title="缩进方式：Tab（点击切换为空格）"><i class="fas fa-indent"></i></button>
            <button type="button" class="toolbar-btn view-mode-btn active" data-mode="split" data-target="editor-about" title="分栏"><i class="fas fa-columns"></i></button>
            <button type="button" class="toolbar-btn view-mode-btn" data-mode="edit" data-target="editor-about" title="仅编辑"><i class="fas fa-pen"></i></button>

              <div class="editor-input-wrap">
                <div class="editor-gutter" data-for="about-content"></div>
                <textarea id="about-content" placeholder="支持 Markdown 语法"></textarea>
              </div>
            </div>
            <div class="editor-pane">
              <div class="post-content" id="about-preview"><p class="muted">预览区域</p></div>
            </div>
          </div>
        </div>
        <div id="about-message" class="message-msg" style="display:none;"></div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary" id="about-submit">保存</button>
          <button type="button" class="btn btn-outline" onclick="cancelAbout()">取消</button>
        </div>
      </form>
    </div>
  </div>

  <div class="admin-view" id="view-tags">
    <div class="edit-box">
      <h3><i class="fas fa-tags"></i> 标签管理</h3>
      <div id="tags-manage-message" class="message-msg" style="display:none;"></div>
      <div id="tags-manage-loading" class="loading">加载中...</div>
      <div id="tags-manage-list"></div>
      <div class="form-actions" style="margin-top:16px;">
        <button type="button" class="btn btn-outline" onclick="cancelTagManage()"><i class="fas fa-arrow-left"></i> 返回</button>
      </div>
