name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx vite build
      - run: node build.js
        env:
          BASE_PATH: /xiaoshenblog.github.io
      - run: |
          rm -rf docs
          cp -r dist docs
          touch docs/.nojekyll
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs/
          git commit -m "deploy: update GitHub Pages" || true
          git push
