# ============================================================
#  MyBlog 博客全局配置
#  修改后重启服务即可生效。
#  基础类型说明：
#    - 字符串请用双引号包裹，如 "value"
#    - 布尔值用 true / false
#    - 数字直接写，如 3000
#  环境变量覆盖：同名的环境变量会优先于本文件中的值。
# ============================================================

# ============================================================
#  服务器设置
# ============================================================

server:
  # 监听端口号。修改后需重启服务。
  port: 3000

# ============================================================
#  站点基础设置
# ============================================================

site:
  # 网站语言。用于 HTML lang 属性、Giscus 评论语言等。
  # 常用值：zh-CN（简体中文）、en（英文）、ja（日语）。
  language: "zh-CN"

# ============================================================
#  数据库 (Supabase)
# ============================================================

database:
  # Supabase 项目 URL。从 Supabase 项目控制台 Settings → API → Project URL 获取。
  url: "https://eacieurozwzligrxnyos.supabase.co"
  # 匿名公钥（anon public key）。从 Settings → API → anon public 获取。
  # 此密钥暴露给前端是安全的，因为 Supabase 通过 Row Level Security 控制权限。
  anon_key: "sb_publishable_owez1XlLUfQiJOkzi23zng_B-A_Ez0P"
  # 服务端密钥（service_role key）。拥有完全管理权限，请妥善保管，不要泄露。
  # 此密钥只在服务端使用，不会暴露给前端。
  service_key: ""
  # 文章数据表名。如果使用不同的表名，请同步修改此处。
  table: "posts"

# ============================================================
#  博客基本信息
# ============================================================

blog:
  # 站点名称。显示在浏览器标题栏、导航栏 Logo 处及页脚版权信息中。
  name: "测试博客"
  # 首页副标题。显示在 Hero 区域的站点名称下方。
  subtitle: "正在测试功能中..."
  # 侧边栏作者卡片中显示的作者名称。
  author: "博主"
  # 作者简介。显示在侧边栏作者头像下方。
  author_bio: "热爱技术，享受生活"
  # 首页每页显示的文章数量。
  page_size: 5
  # 文章摘要截断长度（字符数）。超出部分将被截断并追加 "..."。
  excerpt_length: 200
  # 预估阅读时间的计算基准（字符/分钟）。
  # 公式：文章总字符数 ÷ 该值 = 阅读分钟数。
  reading_speed: 500

# ============================================================
#  国际化 / 界面文字
#  控制博客所有界面显示的文字。修改后立即生效，无需重启。
#  如果想改成英文博客，修改 site.language 为 "en" 并修改此处对应文字即可。
# ============================================================

